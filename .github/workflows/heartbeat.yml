name: Heartbeat

on:
    schedule:
        - cron: "0 0 */3 * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    heartbeat:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Update status.txt
              run: |
                  echo "Last heartbeat: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > status.txt

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add status.txt
                  git diff --cached --quiet || git commit -m "chore: heartbeat update $(date -u '+%Y-%m-%d')"
                  git push
